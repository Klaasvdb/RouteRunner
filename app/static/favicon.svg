<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- Head -->
  <circle cx="21" cy="5.5" r="3.2" fill="white"/>

  <!-- Torso -->
  <line x1="19.5" y1="8.7" x2="14" y2="20"
        stroke="white" stroke-width="2.4" stroke-linecap="round"/>

  <!-- Leading arm -->
  <line x1="17" y1="13" x2="10" y2="10.5"
        stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Trailing arm -->
  <line x1="17" y1="14" x2="23" y2="18"
        stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Leading leg -->
  <polyline points="14,20 8,26 4.5,22"
            stroke="white" stroke-width="2.4"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Trailing leg -->
  <polyline points="14,20 19.5,27.5 26.5,30"
            stroke="white" stroke-width="2.4"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
