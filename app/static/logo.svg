<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Head -->
  <circle cx="64" cy="14" r="8" fill="white"/>

  <!-- Torso (leaning forward) -->
  <line x1="60" y1="22" x2="46" y2="52"
        stroke="white" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Leading arm (forward) -->
  <line x1="53" y1="34" x2="35" y2="27"
        stroke="white" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Trailing arm (back) -->
  <line x1="53" y1="37" x2="70" y2="47"
        stroke="white" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Leading leg (knee up, foot forward) -->
  <polyline points="46,52 30,64 21,54"
            stroke="white" stroke-width="5.5"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Trailing leg (extended back) -->
  <polyline points="46,52 59,70 75,76"
            stroke="white" stroke-width="5.5"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Winding route path at bottom -->
  <path d="M8 90 C18 82,28 98,42 90 C56 82,64 96,76 88 C83 84,88 86,92 86"
        stroke="rgba(255,255,255,0.35)" stroke-width="3"
        stroke-linecap="round" fill="none"/>

  <!-- Location dot on route -->
  <circle cx="42" cy="90" r="3" fill="rgba(255,255,255,0.55)"/>
</svg>
